name: templatecmd
description: "Super awesome template for Comrades Flutter projects by Sharafuddin."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

# Actualy Flutter SDK version is 3.27.0
environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_remote_config: ^6.0.0
  flutter_bloc: ^9.0.0
  flutter_launcher_icons: ^0.14.2
  upgrader: ^11.3.1
  shared_preferences: ^2.3.5
  very_good_analysis: ^9.0.0
  flutter_svg: ^2.0.17
  firebase_crashlytics: ^5.0.0
  intl: ^0.20.2
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.2
  auto_route: ^10.0.0
  talker_flutter: ^5.0.0
  dio: ^5.8.0+1
  talker_dio_logger: ^5.0.0
  talker_bloc_logger: ^5.0.0
  firebase_analytics: ^12.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_gen: ^5.10.0
  bloc: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  auto_route_generator: ^10.0.1
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.3
  json_serializable: ^6.9.4
  flutter_gen_runner: ^5.10.0


flutter:

  generate: true

  uses-material-design: true

  assets:
    - assets/logo.png

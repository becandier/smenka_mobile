include: package:very_good_analysis/analysis_options.7.0.0.yaml
linter:
  rules:
    sort_pub_dependencies: false
    public_member_api_docs: false
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "lib/l10n/gen/**"
  errors:
    invalid_annotation_target: ignore
    avoid_catches_without_on_clauses: ignore

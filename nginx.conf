server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip для текстовых ассетов (main.dart.js, canvaskit, json, wasm).
    # nginx ≥1.21.1 (база 1.27) отдаёт .js как text/javascript — без него в
    # списке main.dart.js (главный и самый тяжёлый ассет) шёл бы без сжатия.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript text/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # SPA-маршрутизация: всё, что не файл, отдаём index.html (любой путь → не 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Точки входа нельзя кэшировать надолго — иначе новый деплой не подхватится.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Иммутабельные ассеты (хэшируются Flutter'ом) — длинный кэш.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
